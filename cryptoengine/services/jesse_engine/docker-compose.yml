services:
  jesse:
    build: .
    container_name: cryptoengine_jesse
    volumes:
      - ./strategies:/jesse-project/strategies
      - ./scripts:/jesse-project/scripts
      - ../../backtest-results/data:/data:ro
      - ./storage:/jesse-project/storage
      - ./.env:/jesse-project/.env:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DATA_DIR=/data
      - FG_DATA_PATH=/data/fear_greed/fear_greed_index.parquet
      - MACRO_CALENDAR_PATH=/data/macro_events/fomc_cpi_calendar.csv
    networks:
      - cryptoengine_default
    working_dir: /jesse-project

networks:
  cryptoengine_default:
    external: true
    name: cryptoengine_default
