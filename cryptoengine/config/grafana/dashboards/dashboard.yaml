# ============================================================
# Grafana Dashboard Provisioning
# ============================================================

apiVersion: 1

providers:
  - name: CryptoEngine Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
