# Grafana 10 unified alerting provisioning - contact points
#
# 알림 흐름: Grafana → dashboard:3000/grafana-webhook → Redis ce:alerts:grafana
#            → telegram-bot (단일 경로) → Telegram
#
# 변경 이유: Grafana 직접 Telegram 전송 시 봇의 ce:alerts:kill_switch 등과
#            중복 전송이 발생함. Webhook 경유로 봇을 단일 알림 허브로 통합.
apiVersion: 1
contactPoints:
  - orgId: 1
    name: telegram-alerts
    receivers:
      - uid: grafana-webhook-main
        type: webhook
        settings:
          url: "http://dashboard:3000/grafana-webhook"
          httpMethod: POST
          maxAlerts: 0
        disableResolveMessage: false
