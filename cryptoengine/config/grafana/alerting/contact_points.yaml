# Grafana 10 unified alerting provisioning - contact points
apiVersion: 1
contactPoints:
  - orgId: 1
    name: telegram-alerts
    receivers:
      - uid: telegram-main
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "${TELEGRAM_CHAT_ID}"
          message: |
            🚨 *CryptoEngine Alert*
            {{ range .Alerts }}
            *{{ .Labels.alertname }}*
            {{ .Annotations.summary }}
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
            상태: {{ .Status }}
            {{ end }}
          parse_mode: Markdown
        disableResolveMessage: false
