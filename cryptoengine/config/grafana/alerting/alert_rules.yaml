apiVersion: 1
groups:
  - orgId: 1
    name: cryptoengine-alerts
    folder: CryptoEngine
    interval: 1m
    rules:

      # ── Rule 1: 펀딩비 급변 (Funding Rate Spike) ──────────────────────────
      - uid: alert-funding-spike
        title: 펀딩비 급변
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: cryptoengine-postgres
            model:
              datasource:
                type: grafana-postgresql-datasource
                uid: cryptoengine-postgres
              editorMode: code
              format: table
              rawQuery: true
              rawSql: >-
                SELECT MAX(ABS(rate)) AS value
                FROM funding_rate_history
                WHERE timestamp >= NOW() - INTERVAL '1 hour'
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.0003]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "펀딩비가 {{ $value | printf \"%.4f\" }}%로 임계값(0.03%)을 초과했습니다"

      # ── Rule 2: 자산 급감 (Equity Drop) ──────────────────────────────────
      - uid: alert-equity-drop
        title: 자산 급감
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: cryptoengine-postgres
            model:
              datasource:
                type: grafana-postgresql-datasource
                uid: cryptoengine-postgres
              editorMode: code
              format: table
              rawQuery: true
              rawSql: >-
                SELECT
                  COALESCE(
                    (1 - CAST(MAX(total_equity) FILTER (WHERE snapshot_at = (SELECT MAX(snapshot_at) FROM portfolio_snapshots)) AS FLOAT)
                       / NULLIF(CAST(MIN(total_equity) FILTER (WHERE snapshot_at = (SELECT MIN(snapshot_at) FROM portfolio_snapshots WHERE snapshot_at >= NOW() - INTERVAL '15 minutes')) AS FLOAT), 0)),
                    0
                  ) AS value
                FROM portfolio_snapshots
                WHERE snapshot_at >= NOW() - INTERVAL '15 minutes'
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.03]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "자산이 15분 내 감소했습니다"

      # ── Rule 3: 데이터 수집 중단 (OHLCV Gap) ─────────────────────────────
      - uid: alert-ohlcv-gap
        title: 데이터 수집 중단
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: cryptoengine-postgres
            model:
              datasource:
                type: grafana-postgresql-datasource
                uid: cryptoengine-postgres
              editorMode: code
              format: table
              rawQuery: true
              rawSql: >-
                SELECT EXTRACT(EPOCH FROM (NOW() - MAX(timestamp))) / 60 AS value
                FROM ohlcv_history
                WHERE symbol = 'BTCUSDT' AND timeframe = '1m'
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "OHLCV 데이터 수집이 {{ $value | printf \"%.0f\" }}분째 중단되었습니다"

      # ── Rule 4: Kill Switch 발동 (Kill Switch Activated) ─────────────────
      - uid: alert-kill-switch
        title: Kill Switch 발동
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: cryptoengine-postgres
            model:
              datasource:
                type: grafana-postgresql-datasource
                uid: cryptoengine-postgres
              editorMode: code
              format: table
              rawQuery: true
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM kill_switch_events
                WHERE triggered_at >= NOW() - INTERVAL '5 minutes'
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Kill Switch가 발동되었습니다! 즉시 확인 요망"

      # ── Rule 5: Sharpe 하락 (Sharpe Drop) ────────────────────────────────
      - uid: alert-sharpe-drop
        title: Sharpe 하락
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 259200
              to: 0
            datasourceUid: cryptoengine-postgres
            model:
              datasource:
                type: grafana-postgresql-datasource
                uid: cryptoengine-postgres
              editorMode: code
              format: table
              rawQuery: true
              rawSql: >-
                SELECT COUNT(*) AS value
                FROM daily_reports
                WHERE date >= CURRENT_DATE - INTERVAL '3 days'
                  AND max_drawdown > 0.1
          - refId: B
            relativeTimeRange:
              from: 259200
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 259200
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [3]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "최대 낙폭이 3일 연속 10% 초과"

      # ── Rule 6: CPU 과다 사용 (High CPU) ──────────────────────────────────
      - uid: alert-high-cpu
        title: CPU 과다 사용
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: cryptoengine-prometheus
            model:
              datasource:
                type: prometheus
                uid: cryptoengine-prometheus
              editorMode: code
              expr: >-
                100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 사용률이 5분간 85%를 초과했습니다 (현재: {{ $value | printf \"%.1f\" }}%)"

      # ── Rule 7: 메모리 부족 (Low Memory) ─────────────────────────────────
      - uid: alert-low-memory
        title: 메모리 부족
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: cryptoengine-prometheus
            model:
              datasource:
                type: prometheus
                uid: cryptoengine-prometheus
              editorMode: code
              expr: >-
                (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [15]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "가용 메모리가 15% 미만입니다 (현재: {{ $value | printf \"%.1f\" }}%). OOM 위험!"

      # ── Rule 8: 디스크 부족 (Low Disk Space) ─────────────────────────────
      - uid: alert-low-disk
        title: 디스크 용량 부족
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: cryptoengine-prometheus
            model:
              datasource:
                type: prometheus
                uid: cryptoengine-prometheus
              editorMode: code
              expr: >-
                (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [10]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "디스크 여유 공간이 10% 미만입니다 (현재: {{ $value | printf \"%.1f\" }}%). 백업/로그 정리 필요"

      # ── Rule 9: Redis 메모리 한계 근접 (Redis Memory Near Limit) ─────────
      - uid: alert-redis-memory
        title: Redis 메모리 한계 근접
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: cryptoengine-prometheus
            model:
              datasource:
                type: prometheus
                uid: cryptoengine-prometheus
              editorMode: code
              expr: >-
                (redis_memory_used_bytes / redis_memory_max_bytes) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions: []
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 메모리 사용률이 80%를 초과했습니다 (현재: {{ $value | printf \"%.1f\" }}%)"
