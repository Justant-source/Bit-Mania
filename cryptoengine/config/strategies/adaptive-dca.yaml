# ============================================================
# Adaptive Dollar-Cost Averaging Strategy Configuration
# ============================================================

strategy:
  name: adaptive_dca
  version: "1.0"
  enabled: true
  description: >
    Dynamically adjusts DCA buy amounts and intervals based on
    market conditions, fear/greed index, volatility, and technical
    indicators. Buys more aggressively during dips and reduces
    allocation during overheated conditions.

# ── Base DCA Parameters ──────────────────────────────────────
base:
  # Base investment amount per interval (USD)
  base_amount_usd: 100
  # Base interval between purchases (hours)
  base_interval_hours: 24
  # Target asset for accumulation
  pairs:
    - BTCUSDT
    - ETHUSDT
  # Position side: long_only | short_only | both
  position_side: long_only
  # Use futures or spot
  instrument_type: futures
  # Leverage for futures positions
  leverage: 1

# ── Adaptive Multipliers ─────────────────────────────────────
adaptive:
  # Multiply base amount by this factor based on conditions
  # Each multiplier is applied independently, then combined

  # Fear & Greed Index (0-100, lower = more fear)
  fear_greed:
    enabled: true
    # Buy more when fear is high
    extreme_fear_multiplier: 2.5    # index 0-10
    fear_multiplier: 1.8            # index 11-25
    neutral_multiplier: 1.0         # index 26-50
    greed_multiplier: 0.5           # index 51-75
    extreme_greed_multiplier: 0.2   # index 76-100

  # Price deviation from moving average
  price_deviation:
    enabled: true
    ma_period: 200
    ma_type: ema
    # Multiplier when price is below MA by given percentage
    deviation_tiers:
      - below_pct: 5
        multiplier: 1.3
      - below_pct: 10
        multiplier: 1.8
      - below_pct: 20
        multiplier: 2.5
      - below_pct: 30
        multiplier: 3.0
    # Multiplier when price is above MA
    above_ma_multiplier: 0.7
    far_above_ma_pct: 20
    far_above_ma_multiplier: 0.3

  # RSI-based adjustment
  rsi:
    enabled: true
    period: 14
    oversold_threshold: 30
    oversold_multiplier: 1.8
    overbought_threshold: 70
    overbought_multiplier: 0.4

  # Volatility-based adjustment (ATR)
  volatility:
    enabled: true
    atr_period: 14
    # High volatility = wider DCA intervals (less frequent)
    high_vol_interval_multiplier: 1.5
    low_vol_interval_multiplier: 0.7
    # High volatility = larger amounts per buy
    high_vol_amount_multiplier: 1.3
    low_vol_amount_multiplier: 0.8

  # Combination method: multiply | average | min | max
  combination_method: multiply
  # Clamp the combined multiplier to prevent extremes
  min_combined_multiplier: 0.1
  max_combined_multiplier: 5.0

# ── Take Profit Ladder ───────────────────────────────────────
take_profit:
  enabled: true
  # Sell portions of accumulated position at profit targets
  tiers:
    - profit_pct: 15
      sell_pct: 10
    - profit_pct: 30
      sell_pct: 15
    - profit_pct: 50
      sell_pct: 20
    - profit_pct: 100
      sell_pct: 25
  # Re-enable DCA buys after taking profit
  resume_dca_after_tp: true
  # Cooldown before resuming DCA after TP (hours)
  resume_cooldown_hours: 48

# ── Graduated Entry (Test C 결과 반영: baseline 대비 +34.3%p 수익률) ──────────
graduated_entry:
  enabled: true
  # 첫 진입 시 기본 매수금액의 일부만 집행
  initial_size_ratio: 0.5       # 1차 매수: 산출 금액의 50%
  # 추가 진입 조건: 1차 진입 후 추가 하락 시 잔여분 집행
  add_on_dip_pct: 5.0           # 1차 진입가 대비 5% 추가 하락 시 잔여 50% 매수
  max_entries_per_cycle: 2      # 사이클당 최대 진입 횟수 (1차 + 추가 1회)
  # 추가 진입 금액 비율 (initial_size_ratio의 나머지)
  followup_size_ratio: 0.5      # 2차 매수: 잔여 50%
  # 추가 진입 가능 시간 창 (시간) — 초과 시 1차 진입만으로 사이클 종료
  add_on_window_hours: 24

# ── Safety & Risk Management ─────────────────────────────────
risk:
  # Maximum total capital deployed in DCA (USD)
  max_total_deployed_usd: 50_000
  # Maximum portfolio allocation (percentage)
  max_portfolio_allocation_pct: 40.0
  # Stop accumulating if unrealized loss exceeds (percentage)
  pause_on_drawdown_pct: 25.0
  # Resume accumulation when drawdown recovers to (percentage)
  resume_on_recovery_pct: 15.0
  # Maximum single purchase (USD) after all multipliers
  max_single_purchase_usd: 1_000
  # Minimum single purchase (USD)
  min_single_purchase_usd: 10
  # Daily spending cap (USD)
  daily_cap_usd: 500
  # Weekly spending cap (USD)
  weekly_cap_usd: 2_000
  # Circuit breaker: consecutive failed buys before alerting
  circuit_breaker_failures: 3
  circuit_breaker_cooldown_minutes: 120
