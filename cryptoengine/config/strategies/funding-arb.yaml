# ============================================================
# Funding Rate Arbitrage Strategy Configuration
# ============================================================

strategy:
  name: funding_arb
  version: "1.0"
  enabled: true
  description: >
    Captures funding rate differentials between perpetual futures
    and spot/other derivatives. Opens delta-neutral positions when
    the annualized funding rate exceeds the entry threshold.

# ── Entry Criteria ────────────────────────────────────────────
entry:
  # Minimum annualized funding rate to trigger entry (percentage)
  min_funding_rate_annualized: 15.0
  # Number of consecutive funding intervals the rate must exceed threshold
  consecutive_intervals: 3
  # Funding interval in hours (Bybit = 8h)
  funding_interval_hours: 8
  # Only enter if predicted next funding aligns with current direction
  require_predicted_alignment: true
  # Minimum open interest (USD) — avoid illiquid contracts
  min_open_interest_usd: 5_000_000
  # Maximum spread between bid/ask to enter (percentage)
  max_entry_spread_pct: 0.05
  # Allowed trading pairs
  pairs:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
    - XRPUSDT

# ── Active Strategy Configuration (fa80_lev5_r30) ────────────
# Backtest: 2020-04-01 ~ 2026-03-31  |  CAGR +34.87%  |  Sharpe 3.583  |  MDD -4.52%  |  Liquidations 0
# Selected: FA capital ratio 80%, leverage 5x, reinvest ratio 30%
#
# Candidate pool (do NOT change without re-running Test 12 Stage D2):
#   fa80_lev4_r30: FA=80% Lev=4x Reinv=30% → CAGR +28.56% Sharpe 3.556 MDD -3.64% (보수적 차선책)
#   fa80_lev5_r50: FA=80% Lev=5x Reinv=50% → CAGR +33.54% Sharpe 1.867 MDD -7.13% (재투자 확대)

# Exchange configuration
exchange: bybit

# FA capital ratio: fraction of total portfolio allocated to this strategy.
# Orchestrator should honor this when distributing capital.
fa_capital_ratio: 0.80

# Leverage applied to the perpetual futures leg.
# Delta-neutral: spot qty = perp qty; leverage reduces perp margin requirement.
leverage: 5.0

# Fraction of realized FA profit reinvested into spot BTC accumulation.
reinvest_ratio: 0.30

# ── Position Sizing ──────────────────────────────────────────
position:
  # Sizing mode: fixed_usd | pct_equity | kelly
  sizing_mode: pct_equity
  # Percentage of total equity per position
  pct_equity: 5.0
  # Hard cap per single position (USD)
  max_position_usd: 10_000
  # Minimum position size (USD)
  min_position_usd: 100
  # Maximum leverage allowed (hard limit — reflects fa80_lev5_r30 selection)
  max_leverage: 5
  # Maximum number of concurrent funding arb positions
  max_concurrent_positions: 5
  # Target delta-neutral ratio (1.0 = perfectly hedged)
  hedge_ratio: 1.0
  # Acceptable hedge drift before rebalancing (percentage)
  hedge_drift_tolerance_pct: 2.0

# ── Exit Criteria ─────────────────────────────────────────────
exit:
  # Exit when annualized rate drops below this threshold
  min_funding_rate_annualized: 5.0
  # Maximum holding period in hours before forced exit
  max_holding_hours: 720  # 30 days
  # Take profit: cumulative funding earned as pct of position
  take_profit_pct: 3.0
  # Stop loss: maximum unrealized loss as pct of position
  stop_loss_pct: 2.0
  # Exit if funding rate flips direction
  exit_on_rate_flip: true
  # Cooldown after exit before re-entering same pair (minutes)
  cooldown_minutes: 60

# ── Risk Management ──────────────────────────────────────────
risk:
  # Maximum total portfolio allocation to funding arb (percentage)
  # fa80_lev5_r30 기준: 80% 배분 — orchestrator.yaml의 가중치와 동기화 필요
  max_portfolio_allocation_pct: 80.0
  # Maximum drawdown before strategy auto-disables (percentage)
  max_drawdown_pct: 5.0
  # Drawdown lookback window in hours
  drawdown_window_hours: 168  # 7 days
  # Correlation limit with other active strategies
  max_strategy_correlation: 0.7
  # Circuit breaker: halt if N consecutive losses
  circuit_breaker_consecutive_losses: 3
  # Circuit breaker cooldown (minutes)
  circuit_breaker_cooldown_minutes: 360

# ── Cross-Exchange Settings ──────────────────────────────────
cross_exchange:
  enabled: false
  # Hedge venue when cross-exchange arb is active
  hedge_exchange: binance
  # Minimum funding rate differential between exchanges
  min_rate_differential_annualized: 10.0
  # Transfer time buffer (minutes) — accounts for withdrawal delays
  transfer_buffer_minutes: 30
  # Maximum capital allocated to cross-exchange positions
  max_cross_exchange_usd: 5_000

# ── Fee Rates ────────────────────────────────────────────────
fees:
  spot_fee_rate: 0.0001    # 0.01%  Bybit spot taker
  perp_fee_rate: 0.00055   # 0.055% Bybit perpetual taker

# ── Slippage & Execution ─────────────────────────────────────
slippage:
  # Expected slippage on entry (percentage)
  expected_entry_slippage_pct: 0.03
  # Expected slippage on exit (percentage)
  expected_exit_slippage_pct: 0.03
  # Maximum acceptable slippage before aborting (percentage)
  max_slippage_pct: 0.10
  # Order type for entry: limit | market
  entry_order_type: limit
  # Order type for exit: limit | market
  exit_order_type: limit
  # Limit order timeout before switching to market (seconds)
  limit_order_timeout_seconds: 30
  # Use TWAP for large positions above this threshold (USD)
  twap_threshold_usd: 5_000
  # TWAP execution window (seconds)
  twap_duration_seconds: 300

# ── Phase 5 Overrides ────────────────────────────────────────
# BYBIT_TESTNET=false 또는 PHASE5_MODE=true 시 자동 적용.
# 소액 실전 ($200 USDT) 환경에 맞게 조정된 보수적 설정.
#
# sizing_mode: fixed_notional — 거래소 최소 주문 대비 충분한 명목가 직접 지정
# fixed_notional_usd: 150 — $200 자본의 75% (25% 안전 버퍼)
# max_concurrent_positions: 1 — 동시 포지션 1개만 (소액 리스크 관리)
# fa_capital_ratio: 0.75 — 0.80 → 0.75 (추가 버퍼)
# reinvest_ratio: 0.0 — 재투자 비활성 (소액에서 무의미)
# min_position_usd: 50 — 100 → 50 (Bybit BTCUSDT 최소 $65 기준 하향)
#
# Phase 5 진입 조건 강화 (수수료/슬리피지 현실 반영):
# 수수료 왕복 0.13% + 슬리피지 0.06% = 총 비용 0.17%
# → 최소 2회 펀딩 수취에 BEP: 연 25% 기준 0.0091%/8h × 2 = 0.0182% > 0.17% (BTC 변동 무시)
phase5:
  sizing_mode: fixed_notional
  fixed_notional_usd: 150       # $200 × 75% (안전 버퍼)
  max_concurrent_positions: 1   # 동시 포지션 1개 (소액 리스크 관리)
  fa_capital_ratio: 0.75        # 0.80 → 0.75
  reinvest_ratio: 0.0           # 재투자 비활성 (소액에선 무의미)
  min_position_usd: 50          # Bybit 최소 주문 $65 기준 하향 조정

  # Phase 5 진입 조건 강화 (수수료 현실 반영: 왕복 ~0.17%)
  entry:
    min_funding_rate_annualized: 25.0   # 15% → 25% (BEP 2회 수취 기준)
    min_funding_rate: 0.00012           # 0.0001 → 0.00012 (8h 기준 0.012%)
    consecutive_intervals: 4            # 3 → 4 (더 보수적)
