x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: cryptoengine
  DB_USER: cryptoengine
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-RedisPass2026!}@redis:6379}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-testnet}

services:
  # ── Data Layer ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cryptoengine
      POSTGRES_USER: cryptoengine
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoengine -d cryptoengine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  pg-backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: cryptoengine
      DB_USER: cryptoengine
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_CRON: ${BACKUP_CRON:-0 17 * * *}   # 매일 02:00 KST
      RUN_ON_STARTUP: ${BACKUP_ON_STARTUP:-false}
    volumes:
      - ./scripts/pg_backup.sh:/scripts/pg_backup.sh:ro
      - ./scripts/pg_backup_entrypoint.sh:/scripts/pg_backup_entrypoint.sh:ro
      - pg-backups:/backups
    entrypoint: ["sh", "/scripts/pg_backup_entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  log-retention:
    image: postgres:16-alpine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: cryptoengine
      DB_USER: cryptoengine
      DB_PASSWORD: ${DB_PASSWORD}
      LOG_RETENTION_CRON: ${LOG_RETENTION_CRON:-0 18 * * *}   # 매일 03:00 KST
      RETENTION_ON_STARTUP: ${RETENTION_ON_STARTUP:-false}
    volumes:
      - ./scripts/log_retention.sh:/scripts/log_retention.sh:ro
      - ./scripts/log_retention_entrypoint.sh:/scripts/log_retention_entrypoint.sh:ro
    entrypoint: ["sh", "/scripts/log_retention_entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-RedisPass2026!}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisPass2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
        reservations:
          memory: 128M

  # ── Core Services ───────────────────────────────────────────
  market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      COINGLASS_API_KEY: ${COINGLASS_API_KEY}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  strategy-orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
      PHASE5_MODE: ${PHASE5_MODE:-false}
      STRICT_MONITORING_HOURS: ${STRICT_MONITORING_HOURS:-0}
      EXPECTED_INITIAL_BALANCE_USD: ${EXPECTED_INITIAL_BALANCE_USD:-}
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  execution-engine:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      PHASE5_MODE: ${PHASE5_MODE:-false}
      STRICT_MONITORING_HOURS: ${STRICT_MONITORING_HOURS:-0}
      EXPECTED_INITIAL_BALANCE_USD: ${EXPECTED_INITIAL_BALANCE_USD:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  # ── Strategy Services ───────────────────────────────────────
  funding-arb:
    build:
      context: .
      dockerfile: services/strategies/funding-arb/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
      STRATEGY_ID: funding-arb-01
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      PHASE5_MODE: ${PHASE5_MODE:-false}
      STRICT_MONITORING_HOURS: ${STRICT_MONITORING_HOURS:-0}
      EXPECTED_INITIAL_BALANCE_USD: ${EXPECTED_INITIAL_BALANCE_USD:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  adaptive-dca:
    build:
      context: .
      dockerfile: services/strategies/adaptive-dca/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
      STRATEGY_ID: adaptive-dca-01
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M
        reservations:
          memory: 32M

  # ── Intelligence & Reporting ────────────────────────────────
  llm-advisor:
    build:
      context: .
      dockerfile: services/llm-advisor/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      CLAUDE_CODE_PATH: /usr/local/bin/claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DATABASE_URL: postgresql://cryptoengine:${DB_PASSWORD}@postgres:5432/cryptoengine
      HOME: /home/claude
    volumes:
      - ./config:/app/config:ro
      - ${HOME}/.claude/.credentials.json:/home/claude/.claude/.credentials.json:ro
      - ${HOME}/.claude/settings.json:/home/claude/.claude/settings.json:ro
      - llm-reports:/app/reports
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      REQUEST_DIR: /app/request_dir
      RESULT_DIR: /app/result_dir
    volumes:
      - ./config:/app/config:ro
      - ../.request:/app/request_dir
      - ../.result:/app/result_dir
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
          memory: 32M

  # ── Dashboard & Monitoring ──────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DASHBOARD_INTERNAL_PORT: ${DASHBOARD_INTERNAL_PORT:-3000}
      DASHBOARD_PUBLIC_PORT: ${DASHBOARD_PUBLIC_PORT:-3001}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
    ports:
      - "${DASHBOARD_INTERNAL_PORT:-3000}:3000"
      - "${DASHBOARD_PUBLIC_PORT:-3001}:3001"
    volumes:
      - ./config:/app/config:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  grafana:
    image: grafana/grafana:10.4.14
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,redis-datasource
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - llm-reports:/usr/share/grafana/public/reports:ro
    ports:
      - "3002:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  # ── Observability Stack ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://:${REDIS_PASSWORD:-RedisPass2026!}@redis:6379
    expose:
      - "9121"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    depends_on:
      - redis-exporter
      - node-exporter
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  # ── Backtesting (on-demand) ─────────────────────────────────
  backtester:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      PYTHONPATH: /app
    volumes:
      - ./config:/app/config:ro
      - ./backtest-results:/app/results
    profiles:
      - backtest
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Walk-Forward 월간 스케줄러 ──────────────────────────────────
  wf-scheduler:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PYTHONPATH: /app
      MONTHLY_WF_CRON: ${MONTHLY_WF_CRON:-0 17 1 * *}   # 매월 1일 02:00 KST
      WF_ON_STARTUP: ${WF_ON_STARTUP:-false}
      WF_SYMBOL: ${WF_SYMBOL:-BTCUSDT}
      WF_CAPITAL: ${WF_CAPITAL:-10000.0}
      WF_LOOKBACK_DAYS: ${WF_LOOKBACK_DAYS:-180}
      WF_TRAIN_DAYS: ${WF_TRAIN_DAYS:-120}
      WF_TEST_DAYS: ${WF_TEST_DAYS:-60}
      WF_MC_RUNS: ${WF_MC_RUNS:-200}
      WF_FA_RATIO: ${WF_FA_RATIO:-0.80}
      WF_LEVERAGE: ${WF_LEVERAGE:-5.0}
      WF_REINVEST: ${WF_REINVEST:-0.30}
      WF_MIN_FUNDING: ${WF_MIN_FUNDING:-0.0001}
    volumes:
      - ./config:/app/config:ro
      - ./backtest-results:/app/results
    entrypoint: ["sh", "/app/scripts/wf_entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  pg-backups:
    driver: local
  llm-reports:
    driver: local
