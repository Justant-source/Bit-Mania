x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: cryptoengine
  DB_USER: cryptoengine
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  ENVIRONMENT: ${ENVIRONMENT:-testnet}

services:
  # ── Data Layer ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cryptoengine
      POSTGRES_USER: cryptoengine
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptoengine -d cryptoengine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-RedisPass2026!}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:6379:6379"

  # ── Core Services ───────────────────────────────────────────
  market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      COINGLASS_API_KEY: ${COINGLASS_API_KEY}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro

  strategy-orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config:ro

  execution-engine:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro

  # ── Strategy Services ───────────────────────────────────────
  funding-arb:
    build:
      context: .
      dockerfile: services/strategies/funding-arb/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/heartbeat_ok"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./config:/app/config:ro

  grid-trading:
    build:
      context: .
      dockerfile: services/strategies/grid-trading/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config:ro

  adaptive-dca:
    build:
      context: .
      dockerfile: services/strategies/adaptive-dca/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      market-data:
        condition: service_started
    environment:
      <<: *common-env
    volumes:
      - ./config:/app/config:ro

  # ── Intelligence & Reporting ────────────────────────────────
  llm-advisor:
    build:
      context: .
      dockerfile: services/llm-advisor/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      CLAUDE_CODE_PATH: ${CLAUDE_CODE_PATH:-/usr/local/bin/claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: postgresql://cryptoengine:${DB_PASSWORD}@postgres:5432/cryptoengine
    volumes:
      - ./config:/app/config:ro
      - /tmp/claude-code:/tmp/claude-code

  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./config:/app/config:ro

  # ── Dashboard & Monitoring ──────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DASHBOARD_INTERNAL_PORT: ${DASHBOARD_INTERNAL_PORT:-3000}
      DASHBOARD_PUBLIC_PORT: ${DASHBOARD_PUBLIC_PORT:-3001}
    ports:
      - "${DASHBOARD_INTERNAL_PORT:-3000}:3000"
      - "${DASHBOARD_PUBLIC_PORT:-3001}:3001"
    volumes:
      - ./config:/app/config:ro

  grafana:
    image: grafana/grafana:10.4.14
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,redis-datasource
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/alerting:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3002:3000"

  # ── Observability Stack ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    expose:
      - "9100"

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    expose:
      - "9121"

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    depends_on:
      - redis-exporter
      - node-exporter
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  # ── Backtesting (on-demand) ─────────────────────────────────
  backtester:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      PYTHONPATH: /app
    volumes:
      - ./config:/app/config:ro
      - ./backtest-results:/app/results
    profiles:
      - backtest

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
